<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Share — My Stats</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <span class="logo">⚡ Solar Share</span>
    <div>
        <a href="index.html">Marketplace</a>
        <a href="post.html">List Surplus</a>
        <a href="stats.html">My Stats</a>
    </div>
    <div class="rate-control">
        <label>Govt Rate ₹</label>
        <input type="number" id="govtRate" min="1" max="20" value="6">
        <span>/unit</span>
    </div>
</nav>

<div class="page">
    <h2>📊 My Stats</h2>

    <div class="summary-grid">
        <div class="summary-card">
            <span class="s-label">Total Units Bought</span>
            <span class="s-value" id="totalUnits">0</span>
        </div>
        <div class="summary-card">
            <span class="s-label">Total Paid (Peer)</span>
            <span class="s-value" id="totalPeerCost">₹0</span>
        </div>
        <div class="summary-card">
            <span class="s-label">Would've Paid (Govt)</span>
            <span class="s-value text-red" id="totalGovtCost">₹0</span>
        </div>
        <div class="summary-card" style="background:#dcfce7">
            <span class="s-label">Total Saved 🎉</span>
            <span class="s-value text-green" id="totalSaved">₹0</span>
        </div>
    </div>

    <h3 style="margin-bottom:16px">Transaction History</h3>
    <div id="tableWrap"></div>
    <div id="emptyMsg" class="empty hidden">No transactions yet.</div>

    <button
        class="btn btn-dark"
        style="margin-top:24px"
        onclick="clearAll()"
    >
        🗑 Clear All Data
    </button>
</div>

<script>
    const govtInput = document.getElementById("govtRate");
    let govtRate = Number(localStorage.getItem("govtRate") || 6);
    govtInput.value = govtRate;
    govtInput.addEventListener("change", () => {
        govtRate = Number(govtInput.value);
        localStorage.setItem("govtRate", govtRate);
    });

    function renderStats() {
        const txs = JSON.parse(localStorage.getItem("transactions") || "[]");

        const totalUnits    = txs.reduce((s, t) => s + t.units, 0);
        const totalPeerCost = +txs.reduce((s, t) => s + t.peerCost, 0).toFixed(2);
        const totalGovtCost = +txs.reduce((s, t) => s + t.govtCost, 0).toFixed(2);
        const totalSaved    = +(totalGovtCost - totalPeerCost).toFixed(2);

        document.getElementById("totalUnits").textContent    = totalUnits;
        document.getElementById("totalPeerCost").textContent = `₹${totalPeerCost}`;
        document.getElementById("totalGovtCost").textContent = `₹${totalGovtCost}`;
        document.getElementById("totalSaved").textContent    = `₹${totalSaved}`;

        const wrap     = document.getElementById("tableWrap");
        const emptyMsg = document.getElementById("emptyMsg");

        if (txs.length === 0) {
            emptyMsg.classList.remove("hidden");
            return;
        }
        emptyMsg.classList.add("hidden");

        wrap.innerHTML = `
            <div style="overflow-x:auto">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Units</th>
                        <th>Peer Price</th>
                        <th>You Paid</th>
                        <th>Govt Cost</th>
                        <th>Saved</th>
                        <th>Temp</th>
                        <th>Weather</th>
                        <th>Grid Load</th>
                        <th>Season</th>
                        <th>AI Reason</th>
                    </tr>
                </thead>
                <tbody>
                    ${txs.map(t => `
                        <tr>
                            <td>${t.date}</td>
                            <td>${t.location}</td>
                            <td>${t.units}</td>
                            <td>₹${t.peerPrice}/unit</td>
                            <td>₹${t.peerCost}</td>
                            <td style="color:#dc2626">₹${t.govtCost}</td>
                            <td style="color:#16a34a;font-weight:bold">₹${t.saved}</td>
                            <td>${t.conditions ? t.conditions.temperature + "°C" : "-"}</td>
                            <td>${t.conditions ? t.conditions.weather : "-"}</td>
                            <td>${t.conditions ? t.conditions.grid_load : "-"}</td>
                            <td>${t.season}</td>
                            <td style="color:#666;font-style:italic;font-size:0.8rem;max-width:200px">${t.reason || "-"}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
            </div>
        `;
    }

    function clearAll() {
        if (confirm("Clear all transactions and listings?")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    renderStats();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Next-Level Study Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f6f8fc;
  color: #2c3e50;
}

.container {
  display: grid;
  grid-template-columns: 240px 1fr 340px;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  background: white;
  padding: 20px;
  border-right: 1px solid #e6ebf2;
}

.sidebar h2 { margin-bottom: 15px; }

.activity {
  padding: 8px 10px;
  margin-bottom: 8px;
  border-radius: 6px;
  color: white;
  font-size: 14px;
  cursor: grab;
}

/* Planner */
.planner {
  display: grid;
  grid-template-rows: 40px repeat(23, 1fr);
  padding: 20px;
  overflow: auto;
}

.header, .row {
  display: grid;
  grid-template-columns: 70px repeat(7, 1fr);
}

.header div {
  text-align: center;
  font-weight: 600;
}

.time {
  font-size: 12px;
  text-align: right;
  padding-right: 8px;
  color: #8a94a6;
}

.slot {
  border: 1px solid #edf1f7;
  border-radius: 6px;
  margin: 2px;
  padding: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: 0.15s;
}

.slot:hover { background: #eef3ff; }

.block {
  color: white;
  font-weight: 500;
}

/* Chat */
.chatbox {
  background: white;
  border-left: 1px solid #e6ebf2;
  display: flex;
  flex-direction: column;
}

.chat-header {
  padding: 15px;
  font-weight: 600;
  border-bottom: 1px solid #e6ebf2;
}

.chat-messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  font-size: 14px;
}

.chat-input {
  display: flex;
  padding: 10px;
  border-top: 1px solid #e6ebf2;
}

.chat-input input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #dce3f0;
}

.chat-input button {
  margin-left: 6px;
  padding: 8px 12px;
  border-radius: 6px;
  border: none;
  background: #4f7cff;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="sidebar">
  <h2>Activities</h2>
  <div id="activityList"></div>
  <input id="newActivity" placeholder="New activity">
  <button onclick="addActivity()">Add</button>
</div>

<!-- CENTER -->
<div class="planner" id="planner"></div>

<!-- RIGHT -->
<div class="chatbox">
  <div class="chat-header">AI Study Assistant</div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="Ask about your study plan...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

</div>

<script>

/* ----------------- CONFIG ----------------- */
const API_KEY = "PASTE_YOUR_NEW_OPENAI_KEY_HERE";

/* ----------------- DATA ----------------- */
const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const hours = generateHours();

let activities = JSON.parse(localStorage.getItem("activities")) || ["Math","Workout","Study"];
let schedule = JSON.parse(localStorage.getItem("schedule")) || {};
let colors = JSON.parse(localStorage.getItem("colors")) || {};

let selectedActivity = null;
let multiStart = null;

/* ----------------- TIME ----------------- */
function generateHours(){
  let arr=[];
  for(let i=4;i<24;i++) arr.push(i);
  for(let i=0;i<=2;i++) arr.push(i);
  return arr;
}

function formatHour(h){
  let suffix=h>=12?"PM":"AM";
  let hour=h%12||12;
  return hour+" "+suffix;
}

function randomColor(){
  const palette=["#5c6bc0","#26a69a","#ef5350","#ffa726","#ab47bc","#42a5f5"];
  return palette[Math.floor(Math.random()*palette.length)];
}

function save(){
  localStorage.setItem("activities",JSON.stringify(activities));
  localStorage.setItem("schedule",JSON.stringify(schedule));
  localStorage.setItem("colors",JSON.stringify(colors));
}

/* ----------------- SIDEBAR ----------------- */
function renderActivities(){
  const list=document.getElementById("activityList");
  list.innerHTML="";
  activities.forEach(act=>{
    if(!colors[act]) colors[act]=randomColor();
    const div=document.createElement("div");
    div.className="activity";
    div.style.background=colors[act];
    div.innerText=act;
    div.draggable=true;

    div.addEventListener("dragstart",()=>selectedActivity=act);
    list.appendChild(div);
  });
  save();
}

function addActivity(){
  const input=document.getElementById("newActivity");
  const val=input.value.trim();
  if(!val) return;
  activities.push(val);
  colors[val]=randomColor();
  input.value="";
  save();
  renderActivities();
}

/* ----------------- PLANNER ----------------- */
function renderPlanner(){
  const planner=document.getElementById("planner");
  planner.innerHTML="";

  const header=document.createElement("div");
  header.className="header";
  header.appendChild(document.createElement("div"));
  days.forEach(d=>{
    const div=document.createElement("div");
    div.innerText=d;
    header.appendChild(div);
  });
  planner.appendChild(header);

  hours.forEach(hour=>{
    const row=document.createElement("div");
    row.className="row";

    const time=document.createElement("div");
    time.className="time";
    time.innerText=formatHour(hour);
    row.appendChild(time);

    days.forEach(day=>{
      const slot=document.createElement("div");
      slot.className="slot";
      const key=day+"-"+hour;

      slot.addEventListener("dragover",(e)=>e.preventDefault());

      slot.addEventListener("drop",()=>{
        if(!selectedActivity) return;
        schedule[key]=selectedActivity;
        save();
        renderPlanner();
        autoAnalyze();
      });

      if(schedule[key]){
        slot.innerText=schedule[key];
        slot.classList.add("block");
        slot.style.background=colors[schedule[key]];
        slot.onclick=()=>{
          delete schedule[key];
          save();
          renderPlanner();
          autoAnalyze();
        };
      } else {
        slot.onclick=()=>{
          if(!selectedActivity) return alert("Drag an activity first.");
          if(!multiStart){
            multiStart={day,hour};
          } else {
            let start=Math.min(multiStart.hour,hour);
            let end=Math.max(multiStart.hour,hour);
            for(let h=start;h<=end;h++){
              schedule[day+"-"+h]=selectedActivity;
            }
            multiStart=null;
            save();
            renderPlanner();
            autoAnalyze();
          }
        };
      }

      row.appendChild(slot);
    });

    planner.appendChild(row);
  });
}

/* ----------------- ANALYTICS ----------------- */
function calculateTotals(){
  let totals={};
  Object.values(schedule).forEach(act=>{
    totals[act]=(totals[act]||0)+1;
  });
  return totals;
}

/* ----------------- AI ----------------- */
async function autoAnalyze(){
  const summary=JSON.stringify(calculateTotals());

  const response=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"You are a university productivity expert."},
        {role:"user",content:"Here is my weekly study hour distribution: "+summary},
        {role:"user",content:"Give improvement suggestions briefly."}
      ]
    })
  });

  const data=await response.json();
  const reply=data.choices?.[0]?.message?.content || "AI unavailable.";
  addChat("Auto Analysis: "+reply,"bot");
}

async function sendMessage(){
  const input=document.getElementById("chatInput");
  const message=input.value.trim();
  if(!message) return;
  addChat("You: "+message,"user");
  input.value="";

  const summary=JSON.stringify(calculateTotals());

  const response=await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+API_KEY
    },
    body:JSON.stringify({
      model:"gpt-4o-mini",
      messages:[
        {role:"system",content:"You are a study planning assistant."},
        {role:"user",content:"Weekly breakdown: "+summary},
        {role:"user",content:message}
      ]
    })
  });

  const data=await response.json();
  const reply=data.choices?.[0]?.message?.content || "Error.";
  addChat("Assistant: "+reply,"bot");
}

function addChat(text,type){
  const box=document.getElementById("chatMessages");
  const div=document.createElement("div");
  div.style.marginBottom="10px";
  div.innerText=text;
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

/* ----------------- INIT ----------------- */
renderActivities();
renderPlanner();
autoAnalyze();

</script>

</body>
</html>
